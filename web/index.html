<!DOCTYPE html>
<html style="overflow: hidden; overscroll-behavior: none;">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="carai">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Favicon: dark/light mode support -->
  <link rel="icon" type="image/svg+xml" href="favicon-dark.svg" media="(prefers-color-scheme: dark)">
  <link rel="icon" type="image/svg+xml" href="favicon-light.svg" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" href="favicon.png">

  <title>carai</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#23170F">
</head>
<body style="background-color: #23170F; overscroll-behavior: none; overflow: hidden; position: fixed; width: 100%; height: 100%;">
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
